# 毎朝7時（日本時間）にニュース収集を自動実行する設定ファイル
name: ニュース自動収集

on:
  schedule:
    # GitHubは世界標準時で動くため、日本時間の朝7時 = 22:00（前日）と書きます
    - cron: "0 22 * * *"
  # 「Run workflow」ボタンで手動実行もできるようにする設定
  workflow_dispatch:

# news.json の更新をリポジトリに書き込むための権限
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリの中身を作業場所にコピー
      - name: ファイルを取得
        uses: actions/checkout@v4

      # 2. Python（収集プログラムを動かす言語）を準備
      - name: Pythonを準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. RSS読み取り用の道具をインストール
      - name: 必要な道具をインストール
        run: pip install feedparser

      # 4. ニュース収集を実行（data/news.json が更新される）
      - name: ニュースを収集
        run: python scripts/collect_news.py

      # 5. 更新された news.json を保存（変更があった場合のみ）
      - name: 結果を保存
        run: |
          git config user.name "news-bot"
          git config user.email "actions@github.com"
          git add data/news.json
          # 変更がなければここで終了（コミットもプッシュもしない）
          if git diff --cached --quiet; then
            echo "変更なし。プッシュをスキップします。"
            exit 0
          fi
          git commit -m "ニュース自動更新 $(date -u -d '+9 hours' '+%Y-%m-%d %H:%M JST')"
          # リモートに新しいコミットがあってもプッシュが弾かれないよう、
          # 取り込み（rebase）→プッシュを最大5回まで再試行する
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              echo "プッシュ成功（試行 $i 回目）"
              exit 0
            fi
            echo "プッシュ失敗。リモートを取り込んで再試行します（試行 $i 回目）"
            sleep 3
          done
          echo "5回試行してもプッシュできませんでした。" >&2
          exit 1
