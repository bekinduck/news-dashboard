<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュースダッシュボード</title>
<style>
  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #1a2433;
    --muted: #6b7686;
    --accent: #2563eb;
    --ai: #7c3aed;
    --biz: #0d9488;
    --border: #e3e8ef;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: #fff;
    padding: 20px 16px 14px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  header h1 { font-size: 1.25rem; }
  header .updated { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }

  .controls {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
  }
  .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
  .tab {
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .searchbox {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 16px; /* スマホでの自動ズーム防止 */
    background: var(--card);
  }
  .count { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

  main { padding: 8px 16px 60px; }
  .date-head {
    font-size: 0.85rem; font-weight: 700; color: var(--muted);
    margin: 18px 0 8px; padding-left: 2px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .source {
    font-size: 0.7rem; font-weight: 600; color: var(--accent);
    background: #eef4ff; padding: 2px 8px; border-radius: 999px;
  }
  .time { font-size: 0.7rem; color: var(--muted); }
  .chip { font-size: 0.65rem; padding: 2px 8px; border-radius: 999px; color: #fff; }
  .chip.ai  { background: var(--ai); }
  .chip.biz { background: var(--biz); }
  .card a.title {
    color: var(--text); text-decoration: none;
    font-weight: 600; font-size: 0.95rem; display: block;
  }
  .card a.title:hover { color: var(--accent); text-decoration: underline; }
  .summary { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .empty, .error {
    text-align: center; color: var(--muted);
    padding: 50px 20px; font-size: 0.9rem;
  }
  mark { background: #fde68a; border-radius: 3px; padding: 0 2px; }
  @media (min-width: 640px) {
    header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>📰 ニュースダッシュボード</h1>
    <div class="updated" id="updated">読み込み中…</div>
  </div>
</header>

<div class="controls">
  <div class="wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" data-genre="all">すべて</button>
      <button class="tab" data-genre="biz">🏢 新規事業・新サービス</button>
      <button class="tab" data-genre="ai">🤖 生成AI・AIツール</button>
    </div>
    <input type="search" class="searchbox" id="search" placeholder="キーワードで検索（例：トヨタ、ChatGPT）">
    <div class="count" id="count"></div>
  </div>
</div>

<main>
  <div class="wrap" id="list">
    <div class="empty">読み込み中…</div>
  </div>
</main>

<script>
const GENRE_LABEL = { ai: "生成AI", biz: "新規事業" };
let allArticles = [];
let currentGenre = "all";
let currentQuery = "";

// ニュースデータを読み込む（?t=... は常に最新を取得するためのおまじない）
fetch("data/news.json?t=" + Date.now())
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    allArticles = data.articles || [];
    const dt = new Date(data.generated_at);
    document.getElementById("updated").textContent =
      "最終更新: " + dt.toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }) +
      "（直近" + (data.days_kept || 14) + "日分を掲載）";
    render();
  })
  .catch(() => {
    document.getElementById("updated").textContent = "";
    document.getElementById("list").innerHTML =
      '<div class="error">ニュースデータ（data/news.json）が読み込めませんでした。<br>初回はGitHub Actionsの収集が一度実行されると表示されます。</div>';
  });

// タブ切り替え
document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab");
  if (!btn) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  currentGenre = btn.dataset.genre;
  render();
});

// 検索（入力のたびに絞り込み）
document.getElementById("search").addEventListener("input", e => {
  currentQuery = e.target.value.trim().toLowerCase();
  render();
});

function esc(s) {
  return s.replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function highlight(text) {
  const safe = esc(text);
  if (!currentQuery) return safe;
  const q = esc(currentQuery).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return safe.replace(new RegExp("(" + q + ")", "gi"), "<mark>$1</mark>");
}

function dateHeading(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const same = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  const label = d.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric", weekday: "short" });
  if (same(d, today)) return "今日 " + label;
  if (same(d, yesterday)) return "昨日 " + label;
  return label;
}

function render() {
  const list = document.getElementById("list");
  const filtered = allArticles.filter(a => {
    if (currentGenre !== "all" && !a.genres.includes(currentGenre)) return false;
    if (currentQuery) {
      const target = (a.title + " " + a.summary + " " + a.source).toLowerCase();
      if (!target.includes(currentQuery)) return false;
    }
    return true;
  });

  document.getElementById("count").textContent = filtered.length + "件を表示中";

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">該当する記事がありません</div>';
    return;
  }

  let html = "", lastHead = "";
  for (const a of filtered) {
    const head = dateHeading(a.published);
    if (head !== lastHead) {
      html += '<div class="date-head">' + head + "</div>";
      lastHead = head;
    }
    const time = new Date(a.published).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    const chips = a.genres.map(g =>
      '<span class="chip ' + g + '">' + GENRE_LABEL[g] + "</span>").join("");
    html +=
      '<div class="card">' +
        '<div class="meta"><span class="source">' + esc(a.source) + "</span>" +
        '<span class="time">' + time + "</span>" + chips + "</div>" +
        '<a class="title" href="' + esc(a.link) + '" target="_blank" rel="noopener">' + highlight(a.title) + "</a>" +
        (a.summary ? '<div class="summary">' + highlight(a.summary) + "</div>" : "") +
      "</div>";
  }
  list.innerHTML = html;
}
</script>
</body>
</html>
